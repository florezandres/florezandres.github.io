<footer>
    <img id="footer-image" src="assets/images/windows-vista.webp" alt="Footer Image" (click)="onFooterImageClick()">
    <div class="taskbar-icons">
        <div class="hora">
        <span id="hora">
            {{ (currentTime.getHours() % 12 === 0 ? 12 : currentTime.getHours() % 12) + ':' + (currentTime.getMinutes() < 10 ? ('0' + currentTime.getMinutes()) : currentTime.getMinutes()) + ' ' + (currentTime.getHours() >= 12 ? 'PM' : 'AM') }}
        </span>
        </div>
        <div class="sound">
            <img id="sound-icon" src="assets/icons/sound.ico" alt="Sound Icon">
        </div>
        <div class="network">
            <img id="network-icon" src="assets/icons/network.ico" alt="Network Icon">
        </div>
        <div class="language">
            <span (click)="onLanguageIconClick()" id="language">EN</span>
        </div>
    </div>

</footer>

<div id="taskbar-menu" class="taskbar-menu">
</div>

<div id="language-tooltip" role="tooltip" class="is-top is-left">
    <p>Change Language</p>
    <p>Cambiar Idioma</p>
</div>

<div class="language-options">
    <button id="language-en" class="language-option" (click)="changeLanguage('EN')">EN</button>
    <button id="language-es" class="language-option" (click)="changeLanguage('ES')">ES</button>
</div>
